# =============================================================================
# Trading Room SaaS - CI/CD Pipeline
# =============================================================================
# GitHub Actions workflow for testing, building, and deploying
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Signaling Server Tests
  # ===========================================================================
  signaling-test:
    name: Signaling Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signaling

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'
          cache-dependency-path: signaling/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage
        env:
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: signaling/coverage/lcov.info
          flags: signaling
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # SFU Tests
  # ===========================================================================
  sfu-test:
    name: SFU Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sfu

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'
          cache-dependency-path: sfu/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          REDIS_URL: redis://localhost:6379

  # ===========================================================================
  # Rust Signaling Server Tests
  # ===========================================================================
  signaling-rs-test:
    name: Rust Signaling Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signaling-rs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: signaling-rs

      - name: Run cargo check
        run: cargo check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

      - name: Run cargo fmt --check
        run: cargo fmt --check

  # ===========================================================================
  # Recorder Tests
  # ===========================================================================
  recorder-test:
    name: Recorder Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recorder

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'
          cache-dependency-path: recorder/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ===========================================================================
  # Rust API (Axum/Tokio/sqlx) Tests
  # ===========================================================================
  api-rs-test:
    name: Rust API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rs

      - name: Run cargo fmt --check
        run: cargo fmt --all --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  # ===========================================================================
  # SvelteKit Frontend Tests
  # ===========================================================================
  frontend-svelte-test:
    name: SvelteKit Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run svelte-check
        run: npm run check

      - name: Build
        run: npm run build

  # ===========================================================================
  # Build & Push Docker Images
  # ===========================================================================
  build:
    name: Build Docker Images
    needs: [signaling-test, sfu-test, signaling-rs-test, recorder-test, api-rs-test, frontend-svelte-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: signaling
            dockerfile: infrastructure/docker/Dockerfile.signaling
            context: signaling
          - service: sfu
            dockerfile: infrastructure/docker/Dockerfile.sfu
            context: sfu
          - service: api-rs
            dockerfile: infrastructure/docker/Dockerfile.api-rs
            context: .
          - service: frontend-svelte
            dockerfile: infrastructure/docker/Dockerfile.frontend-svelte
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.tradingroom.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/tradingroom
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
          EOF

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.tradingroom.io/health || exit 1
          curl -f https://staging-api.tradingroom.io/health || exit 1

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://tradingroom.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Blue/Green deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/tradingroom

            # Pull new images
            docker compose pull

            # Start new containers (blue/green)
            docker compose up -d --no-deps --scale backend=2 backend

            # Wait for health check
            sleep 30

            # Remove old containers
            docker compose up -d --remove-orphans

            # Cleanup
            docker system prune -f
          EOF

      - name: Verify deployment
        run: |
          sleep 60
          for i in {1..5}; do
            curl -f https://tradingroom.io/health && break || sleep 10
          done
          curl -f https://api.tradingroom.io/health

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deployment successful for Trading Room SaaS",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
                  }
                }
              ]
            }
