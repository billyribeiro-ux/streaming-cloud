# =============================================================================
# Trading Room SaaS - Docker Compose Configuration
# =============================================================================
# Development configuration by default. For production deployment,
# set environment variables explicitly or use docker-compose.prod.yml
# =============================================================================

services:
  # ===========================================================================
  # PgBouncer - Database Connection Pooling
  # ===========================================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: tradingroom-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}?sslmode=require
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    networks:
      - tradingroom-network
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ===========================================================================
  # Node.js Signaling Server
  # ===========================================================================
  signaling:
    build:
      context: ../../signaling
      dockerfile: ../infrastructure/docker/Dockerfile.signaling
    container_name: tradingroom-signaling
    restart: unless-stopped
    ports:
      - "3000:3000"
    stop_grace_period: 30s
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tradingroom_redis}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=true
      - JWT_SECRET=${JWT_SECRET}
      - SFU_NODES=${SFU_NODES}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - redis
    networks:
      - tradingroom-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Mediasoup SFU Node
  # ===========================================================================
  sfu:
    build:
      context: ../../sfu
      dockerfile: ../infrastructure/docker/Dockerfile.sfu
    container_name: tradingroom-sfu
    restart: unless-stopped
    # Host networking: the SFU binds its RTC UDP/TCP ports directly on the host
    # for the lowest-latency media path (no Docker NAT, no per-port userland
    # proxy) and so the WebRTC announced-IP candidates are reachable. The SFU is
    # meant to run on its own dedicated box in production — see
    # docs/MEDIA_INFRASTRUCTURE.md. Control-plane HTTP is on host port 4000 and
    # the RTC media range below (40000-49999 UDP+TCP) must be open in the firewall.
    network_mode: host
    stop_grace_period: 30s
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4000
      - NODE_ID=${SFU_NODE_ID:-sfu-1}
      # Under host networking the bridge `redis` DNS name is unavailable; reach
      # Redis via its host-published port. In production point this at your
      # Redis host/endpoint.
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tradingroom_redis}@localhost:6379
      # These names MUST match what sfu/src/config reads (the MEDIASOUP_* prefix);
      # the old RTC_MIN_PORT/RTC_MAX_PORT/ANNOUNCED_IP were silently ignored.
      - MEDIASOUP_RTC_MIN_PORT=40000
      - MEDIASOUP_RTC_MAX_PORT=49999
      # The host's PUBLIC IPv4 — clients connect here for media. Must be set.
      - MEDIASOUP_ANNOUNCED_IP=${SFU_ANNOUNCED_IP}
      - MEDIASOUP_LOG_LEVEL=warn
    depends_on:
      - redis
    # Required for Mediasoup
    cap_add:
      - SYS_NICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  # ===========================================================================
  # Redis Cache & Message Queue
  # ===========================================================================
  redis:
    image: redis:8-alpine
    container_name: tradingroom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:-tradingroom_redis}
    networks:
      - tradingroom-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tradingroom_redis}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Coturn TURN Server
  # ===========================================================================
  coturn:
    image: coturn/coturn:latest
    container_name: tradingroom-turn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    network_mode: host
    healthcheck:
      test: ["CMD", "turnadmin", "-l"]
      interval: 30s
      timeout: 10s
      retries: 3



  # ===========================================================================
  # Recording Service
  # ===========================================================================
  recorder:
    build:
      context: ../../recorder
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - NODE_ENV=production
    ports:
      - "5000:5000"
    networks:
      - tradingroom-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # Jaeger - Distributed Tracing (OpenTelemetry)
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: tradingroom-jaeger
    restart: unless-stopped
    ports:
      - "5775:5775/udp"   # Zipkin compact thrift
      - "6831:6831/udp"   # Jaeger compact thrift
      - "6832:6832/udp"   # Jaeger binary thrift
      - "5778:5778"       # Jaeger config server
      - "16686:16686"     # Jaeger UI (http://localhost:16686)
      - "14268:14268"     # Jaeger collector HTTP
      - "14250:14250"     # Jaeger collector gRPC
      - "9411:9411"       # Zipkin collector
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
      - LOG_LEVEL=info
    volumes:
      - jaeger-data:/badger
    networks:
      - tradingroom-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Rust API (Axum/Tokio/sqlx) — the Laravel backend rewrite
  # ===========================================================================
  api-rs:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api-rs
    container_name: tradingroom-api-rs
    restart: unless-stopped
    ports:
      - "8080:8080"
    stop_grace_period: 30s
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tradingroom_redis}@redis:6379
      - SIGNALING_URL=${SIGNALING_URL:-http://signaling:3000}
      - SIGNALING_SECRET=${SIGNALING_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - STRIPE_SECRET=${STRIPE_SECRET}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - RUST_LOG=info
      # Export traces to the bundled Jaeger via OTLP/HTTP (4318).
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - redis
      - jaeger
    networks:
      - tradingroom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # SvelteKit Frontend (adapter-node, SSR) — the React frontend rewrite
  # ===========================================================================
  frontend-svelte:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-svelte
    container_name: tradingroom-frontend-svelte
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # Server-side BFF target (the Rust API) and the public signaling WS origin.
      - API_URL=http://api-rs:8080
      - PUBLIC_SIGNALING_URL=${SIGNALING_WS_URL}
    depends_on:
      - api-rs
    networks:
      - tradingroom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  tradingroom-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  backend-storage:
  redis-data:
  jaeger-data:
